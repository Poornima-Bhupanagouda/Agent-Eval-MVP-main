# =============================================================================
# Tool Use Validation Template Pack
# =============================================================================
# Tests agents that interact with external tools and APIs. Validates:
#   - Correct tool selection for the given task
#   - Argument accuracy and formatting
#   - Tool call sequencing (multi-step workflows)
#   - Error handling when tools return failures
#   - Appropriate tool avoidance when not needed
#
# Each test specifies expected_tool_calls to verify the agent selects the
# right tool with the right arguments in the right order.
# =============================================================================

name: "Tool Use Validation Pack"
description: "Validates correct tool selection, argument accuracy, call sequencing, and error handling for tool-using agents"
agent_type: "tool_using"
endpoint: "{endpoint}"

tests:
  # --------------------------------------------------------------------------
  # Test 1: Single tool — correct selection
  # Purpose: Does the agent pick the right tool for a simple, unambiguous request?
  # --------------------------------------------------------------------------
  - name: "Simple tool selection - weather lookup"
    input: "What's the current weather in Indianapolis, Indiana?"
    expected: "temperature, conditions, Indianapolis"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - task_completion
    expected_tool_calls:
      - tool: "get_weather"
        args:
          location: "Indianapolis, Indiana"
          units: "fahrenheit"

  # --------------------------------------------------------------------------
  # Test 2: Tool argument precision
  # Purpose: Does the agent pass the correct, well-formatted arguments?
  # --------------------------------------------------------------------------
  - name: "Precise argument formatting - date and location"
    input: "Book a conference room for 10 people on March 15, 2026 from 2:00 PM to 3:30 PM in Building A."
    expected: "booked, conference room, March 15, confirmed"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - task_completion
    expected_tool_calls:
      - tool: "book_conference_room"
        args:
          date: "2026-03-15"
          start_time: "14:00"
          end_time: "15:30"
          capacity: 10
          building: "A"

  # --------------------------------------------------------------------------
  # Test 3: Sequential multi-tool workflow
  # Purpose: Does the agent call tools in the correct order for a dependent workflow?
  # --------------------------------------------------------------------------
  - name: "Sequential tool chain - lookup then update"
    input: "Find the customer record for john.doe@example.com and update their phone number to 317-555-0142."
    expected: "updated, phone number, john.doe@example.com, confirmed"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - tool_sequence
      - task_completion
    expected_tool_calls:
      - tool: "search_customer"
        args:
          email: "john.doe@example.com"
      - tool: "update_customer"
        args:
          customer_id: "{result_from_search}"
          field: "phone"
          value: "317-555-0142"

  # --------------------------------------------------------------------------
  # Test 4: Parallel tool calls
  # Purpose: Does the agent recognize independent operations can run in parallel?
  # --------------------------------------------------------------------------
  - name: "Parallel independent tool calls"
    input: "Get me the current stock prices for AAPL, GOOGL, and MSFT."
    expected: "AAPL, GOOGL, MSFT, price"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - task_completion
    expected_tool_calls:
      - tool: "get_stock_price"
        args:
          symbol: "AAPL"
      - tool: "get_stock_price"
        args:
          symbol: "GOOGL"
      - tool: "get_stock_price"
        args:
          symbol: "MSFT"

  # --------------------------------------------------------------------------
  # Test 5: Tool avoidance — no tool needed
  # Purpose: Does the agent avoid calling tools when the question is answerable
  #          from its own knowledge?
  # --------------------------------------------------------------------------
  - name: "Tool avoidance - general knowledge question"
    input: "What is the capital of France?"
    expected: "Paris"
    metrics:
      - tool_correctness
      - task_completion
    expected_tool_calls: []

  # --------------------------------------------------------------------------
  # Test 6: Complex multi-step with conditional logic
  # Purpose: Does the agent handle a workflow where the second call depends on
  #          the first call's result?
  # --------------------------------------------------------------------------
  - name: "Conditional tool chain - check before action"
    input: "Check if we have more than 100 units of SKU-7892 in inventory. If we do, create a shipment of 50 units to warehouse B."
    expected: "inventory check, SKU-7892, shipment, warehouse B"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - tool_sequence
      - task_completion
    expected_tool_calls:
      - tool: "check_inventory"
        args:
          sku: "SKU-7892"
      - tool: "create_shipment"
        args:
          sku: "SKU-7892"
          quantity: 50
          destination: "warehouse_b"
        condition: "inventory_count > 100"

  # --------------------------------------------------------------------------
  # Test 7: Tool with complex nested arguments
  # Purpose: Can the agent construct deeply structured tool call arguments?
  # --------------------------------------------------------------------------
  - name: "Complex nested arguments - database query"
    input: "Search the patient database for all female patients aged 40-65 who were diagnosed with type 2 diabetes in the last 2 years and are currently on metformin. Sort by last visit date."
    expected: "patient list, search results, type 2 diabetes, metformin"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - task_completion
    expected_tool_calls:
      - tool: "query_patient_database"
        args:
          filters:
            gender: "female"
            age_range:
              min: 40
              max: 65
            diagnosis:
              condition: "type_2_diabetes"
              diagnosed_within_years: 2
            current_medications:
              includes: "metformin"
          sort_by: "last_visit_date"
          sort_order: "descending"

  # --------------------------------------------------------------------------
  # Test 8: Error recovery — tool failure handling
  # Purpose: Does the agent handle a tool failure gracefully and try an alternative?
  # --------------------------------------------------------------------------
  - name: "Tool error recovery - fallback strategy"
    input: "Send a Slack message to the #engineering channel saying 'Deploy v2.4.1 complete'. If Slack is down, send it via email to the engineering distribution list."
    expected: "message sent, engineering, deploy complete"
    metrics:
      - tool_correctness
      - tool_sequence
      - task_completion
    expected_tool_calls:
      - tool: "send_slack_message"
        args:
          channel: "#engineering"
          message: "Deploy v2.4.1 complete"
      - tool: "send_email"
        args:
          to: "engineering-dl@company.com"
          subject: "Deploy v2.4.1 complete"
          body: "Deploy v2.4.1 complete"
        condition: "slack_send_failed"

  # --------------------------------------------------------------------------
  # Test 9: Tool with user confirmation required
  # Purpose: Does the agent seek confirmation before executing a destructive action?
  # --------------------------------------------------------------------------
  - name: "Destructive action confirmation - database deletion"
    input: "Delete all test records from the production customer database where email contains '@test.example.com'."
    expected: "confirm, delete, production, test records, are you sure"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - task_completion
    expected_tool_calls:
      - tool: "count_matching_records"
        args:
          table: "customers"
          filter: "email LIKE '%@test.example.com%'"
          database: "production"
      # Agent should present count and ask for confirmation before proceeding
      - tool: "delete_records"
        args:
          table: "customers"
          filter: "email LIKE '%@test.example.com%'"
          database: "production"
        condition: "user_confirmed"

  # --------------------------------------------------------------------------
  # Test 10: Multi-tool orchestration with data transformation
  # Purpose: Can the agent chain tools with data transformation between steps?
  # --------------------------------------------------------------------------
  - name: "Multi-tool orchestration with data transformation"
    input: "Pull the last 30 days of sales data, calculate the total revenue by product category, and generate a bar chart visualization. Then email the chart to the leadership team."
    expected: "sales data, chart, email sent, leadership"
    metrics:
      - tool_correctness
      - tool_args_accuracy
      - tool_sequence
      - task_completion
    expected_tool_calls:
      - tool: "query_sales_data"
        args:
          date_range: "last_30_days"
          fields:
            - "product_category"
            - "revenue"
      - tool: "aggregate_data"
        args:
          group_by: "product_category"
          metric: "sum"
          field: "revenue"
      - tool: "create_chart"
        args:
          type: "bar"
          title: "Revenue by Product Category (Last 30 Days)"
          x_axis: "product_category"
          y_axis: "total_revenue"
      - tool: "send_email"
        args:
          to: "leadership-team@company.com"
          subject: "Revenue by Product Category - Last 30 Days"
          attachments:
            - "{chart_output}"
